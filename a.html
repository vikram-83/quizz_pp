<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Examination System - 10 Questions Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .timer {
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
            color: #e74c3c;
            margin-bottom: 20px;
        }

        .question {
            margin-bottom: 25px;
            padding: 20px;
            border: 2px solid #eee;
            border-radius: 15px;
            background: #f8f9fa;
        }

        .question h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .options label {
            display: block;
            margin: 10px 0;
            padding: 12px 15px;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid #ddd;
        }

        .options label:hover {
            background: #e3f2fd;
            border-color: #2196f3;
            transform: translateX(5px);
        }

        .options input[type="radio"] {
            margin-right: 10px;
            transform: scale(1.2);
        }

        .buttons {
            text-align: center;
            margin-top: 30px;
        }

        button {
            padding: 15px 40px;
            font-size: 1.1em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 0 10px;
        }

        .submit-btn {
            background: #27ae60;
            color: white;
        }

        .submit-btn:hover {
            background: #219a52;
            transform: translateY(-2px);
        }

        .next-btn {
            background: #3498db;
            color: white;
        }

        .next-btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .result {
            text-align: center;
            padding: 30px;
            display: none;
        }

        .score {
            font-size: 3em;
            font-weight: bold;
            margin: 20px 0;
        }

        .perfect { color: #27ae60; }
        .good { color: #f39c12; }
        .poor { color: #e74c3c; }

        .answers-list {
            margin-top: 30px;
            text-align: left;
        }

        .correct { color: #27ae60; font-weight: bold; }
        .wrong { color: #e74c3c; font-weight: bold; text-decoration: line-through; }

        .progress {
            width: 100%;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: #3498db;
            width: 0%;
            transition: width 0.3s;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
                margin: 10px;
            }
            
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 Online Quiz Test</h1>
        <div class="timer" id="timer">Time: 2:50:00</div>
        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <form id="quizForm">
            <!-- Questions will be dynamically inserted here -->
        </form>

        <div class="buttons" id="buttons">
            <button type="button" class="next-btn" onclick="nextQuestion()">Next →</button>
            <button type="submit" class="submit-btn" style="display:none;" id="submitBtn">Submit Test</button>
        </div>

        <div class="result" id="result">
            <h2>🎉 Test Complete!</h2>
            <div class="score" id="finalScore"></div>
            <p id="scoreMessage"></p>
            <div class="answers-list" id="answersList"></div>
            <button onclick="restartQuiz()" style="margin-top:20px;">🔄 Restart Quiz</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                question: "HTML का full form क्या है?",
                options: ["Hyper Text Markup Language", "High Text Markup Language", "Hyper Tabular Markup Language", "Home Tool Markup Language"],
                correct: 0
            },
            {
                question: "CSS का full form क्या है?",
                options: ["Creative Style Sheets", "Colorful Style Sheets", "Cascading Style Sheets", "Computer Style Sheets"],
                correct: 2
            },
            {
                question: "JavaScript कौन सी programming language है?",
                options: ["Server-side", "Client-side", "Both", "None"],
                correct: 1
            },
            {
                question: "Python एक _____ language है?",
                options: ["Compiled", "Interpreted", "Both", "None"],
                correct: 1
            },
            {
                question: "1 TB = ? GB",
                options: ["1000 GB", "1024 GB", "500 GB", "2048 GB"],
                correct: 1
            },
            {
                question: "RAM का full form क्या है?",
                options: ["Random Access Memory", "Read Access Memory", "Run Access Memory", "Random All Memory"],
                correct: 0
            },
            {
                question: "कौन सा tag paragraph के लिए use होता है?",
                options: ["&lt;div&gt;", "&lt;p&gt;", "&lt;span&gt;", "&lt;br&gt;"],
                correct: 1
            },
            {
                question: "for loop का syntax क्या है?",
                options: ["for (i=0; i<10; i++)", "for i=0 to 10", "loop for i=0; i<10", "for i in range(10)"],
                correct: 0
            },
            {
                question: "Array का first element किस index पर होता है?",
                options: ["0", "1", "-1", "first"],
                correct: 0
            },
            {
                question: "function को call करने के बाद return keyword का use क्यों करते हैं?",
                options: ["Value return करने के लिए", "Function को stop करने के लिए", "Both", "None"],
                correct: 2
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let userAnswers = [];
        let timeLeft = 150; // 2:50 minutes in seconds
        let timer;

        // Initialize quiz
        function initQuiz() {
            showQuestion();
            startTimer();
            updateProgress();
        }

        function showQuestion() {
            const form = document.getElementById('quizForm');
            const question = questions[currentQuestion];
            
            form.innerHTML = `
                <div class="question">
                    <h3>Q${currentQuestion + 1}. ${question.question}</h3>
                    <div class="options">
                        ${question.options.map((option, index) => `
                            <label>
                                <input type="radio" name="q${currentQuestion}" value="${index}">
                                ${String.fromCharCode(65 + index)}. ${option}
                            </label>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function nextQuestion() {
            // Check if answer is selected
            const selected = document.querySelector(`input[name="q${currentQuestion}"]:checked`);
            if (!selected && currentQuestion < questions.length - 1) {
                alert('कृपया question का answer select करें!');
                return;
            }

            if (selected) {
                userAnswers[currentQuestion] = parseInt(selected.value);
            }

            currentQuestion++;

            if (currentQuestion < questions.length) {
                showQuestion();
                updateProgress();
            } else {
                document.getElementById('buttons').style.display = 'none';
                document.getElementById('submitBtn').style.display = 'inline-block';
            }
        }

        function updateProgress() {
            const progress = ((currentQuestion) / questions.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function startTimer() {
            timer = setInterval(() => {
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                document.getElementById('timer').textContent = `Time: ${minutes}:${seconds.toString().padStart(2, '0')}`;
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    submitQuiz();
                }
            }, 1000);
        }

        function submitQuiz() {
            clearInterval(timer);
            
            // Save last answer
            const selected = document.querySelector(`input[name="q${currentQuestion}"]:checked`);
            if (selected) {
                userAnswers[currentQuestion] = parseInt(selected.value);
            }

            // Calculate score
            score = 0;
            for (let i = 0; i < questions.length; i++) {
                if (userAnswers[i] === questions[i].correct) {
                    score++;
                }
            }

            showResult();
        }

        function showResult() {
            document.getElementById('quizForm').style.display = 'none';
            document.getElementById('buttons').style.display = 'none';
            document.getElementById('result').style.display = 'block';

            const percentage = (score / questions.length) * 100;
            let scoreClass = 'poor';
            let message = '';

            if (percentage >= 90) {
                scoreClass = 'perfect';
                message = '🎉 Excellent! आप बहुत अच्छे हैं!';
            } else if (percentage >= 70) {
                scoreClass = 'good';
                message = '👍 Good Job! अच्छा प्रयास!';
            } else {
                message = '📚 और practice करें!';
            }

            document.getElementById('finalScore').textContent = `${score}/${questions.length}`;
            document.getElementById('finalScore').className = `score ${scoreClass}`;
            document.getElementById('scoreMessage').textContent = message;

            // Show answers
            let answersHtml = '<h3>📋 Detailed Answers:</h3>';
            questions.forEach((q, index) => {
                const userAns = userAnswers[index];
                const isCorrect = userAns === q.correct;
                answersHtml += `
                    <div style="margin: 15px 0; padding: 15px; background: ${isCorrect ? '#d4edda' : '#f8d7da'}; border-radius: 10px; border-left: 5px solid ${isCorrect ? '#28a745' : '#dc3545'};">
                        <strong>Q${index + 1}:</strong> ${q.question}<br>
                        <strong>Your Answer:</strong> ${String.fromCharCode(65 + userAns)} ${isCorrect ? '<span class="correct">✅ Correct</span>' : `<span class="wrong">❌ Wrong</span>`}<br>
                        <strong>Correct Answer:</strong> <span class="correct">${String.fromCharCode(65 + q.correct)}. ${q.options[q.correct]}</span>
                    </div>
                `;
            });
            document.getElementById('answersList').innerHTML = answersHtml;
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            userAnswers = [];
            timeLeft = 100;
            
            document.getElementById('quizForm').style.display = 'block';
            document.getElementById('buttons').style.display = 'block';
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('result').style.display = 'none';
            
            initQuiz();
        }

        // Form submit handler
        document.getElementById('quizForm').addEventListener('submit', (e) => {
            e.preventDefault();
            submitQuiz();
        });

        // Initialize
        initQuiz();
    </script>
</body>
</html>
